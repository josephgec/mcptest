{% extends "base.html" %}
{% block title %}Not Found — mcptest{% endblock %}
{% block content %}

<div style="text-align:center; padding:80px 0;">
  <div style="font-size:64px; font-weight:800; color:#1f2937; margin-bottom:16px;">404</div>
  <h1 style="font-size:20px; font-weight:600; color:#f9fafb; margin-bottom:8px;">Not Found</h1>
  {% if run_id %}
  <p style="font-size:14px; color:#6b7280;">Run #{{ run_id }} does not exist.</p>
  {% else %}
  <p style="font-size:14px; color:#6b7280;">The page you're looking for doesn't exist.</p>
  {% endif %}
  <a href="/dashboard/" class="btn btn-primary" style="display:inline-block; margin-top:20px;">Go to Dashboard</a>
</div>

{% endblock %}
